<style>
        body {
            background-color: #f7faf8;
            color: #181c1c;
            width: 390px;
            height: 844px;
            overflow: hidden;
            position: relative;
            margin: 0 auto;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .custom-radio:checked + label .radio-circle {
            background-color: #006c49;
            box-shadow: inset 0 0 0 3px white;
        }
        .payment-option.active {
            background-color: #ecfdf5;
            border-left: 3px solid oklch(72% 0.17 160);
        }
        /* Mobile-Money specific input look */
        input:focus {
            outline: none;
            border-color: #006c49;
        }
        /* Asymmetric Layout Rules */
        .page-margin-left { padding-left: 20px; }
        .page-margin-right { padding-right: 28px; }
    </style>
</head>
<body class="flex flex-col font-body-md">
<!-- Top Navigation Bar -->
<header class="flex justify-between items-center w-full pl-[20px] pr-[28px] h-[64px] bg-surface-bright sticky top-0 z-50">
<button class="flex items-center justify-center w-10 h-10 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface text-[24px]">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Paiement</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 overflow-y-auto pb-stack-lg">
<!-- Amount Section -->
<section class="mt-8 flex flex-col items-center justify-center">
<span class="font-label-md text-label-md text-on-surface-variant mb-1">Montant à régler</span>
<div class="flex items-baseline gap-1">
<span class="font-headline-xl text-[32px] text-brand-emerald">45 500</span>
<span class="font-body-md text-[16px] text-brand-emerald font-normal">FCFA</span>
</div>
</section>
<!-- Payment Selection -->
<section class="mt-stack-lg page-margin-left page-margin-right">
<h2 class="font-label-lg text-[14px] font-semibold text-on-surface mb-stack-sm">Choisissez votre moyen de paiement</h2>
<div class="flex flex-col gap-2" id="payment-options">
<!-- Wave -->
<div class="payment-option flex items-center h-[56px] px-4 cursor-pointer transition-all duration-200 active" onclick="selectPayment(this)">
<div class="w-10 h-10 rounded-lg overflow-hidden bg-white flex items-center justify-center">
<img alt="Wave" class="w-8 h-8 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLtZxuUnJ2P9IjJP2YhD8GjeNuP3iX0TkBZzkYlASrGtmfqrFc593bwxl2EyEzsTTHG_HiKbSGCuH31etWPUBM2ufR11EHtt44QorZAVVgo556JuQxYh1B98iKFgRr1bTQRG_2Km06I4fAGpV6WL4qIlBkrU_N5uf7s7ailZIvoQdGkUZOyz--MNVDSZnwmNWjeCATp6BouzS_hCZDy1ogXPOblVsvv7FVRd1XgkK8alk9gd73Z7QQpY9txu"/>
</div>
<span class="flex-1 ml-4 font-body-md font-semibold text-on-surface">Wave</span>
<div class="radio-circle w-5 h-5 rounded-full border-2 border-outline-variant transition-all"></div>
</div>
<!-- Orange Money -->
<div class="payment-option flex items-center h-[56px] px-4 cursor-pointer transition-all duration-200" onclick="selectPayment(this)">
<div class="w-10 h-10 rounded-lg overflow-hidden bg-white flex items-center justify-center">
<img alt="Orange Money" class="w-8 h-8 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLvDshXAjYLXUTJAx24VJFR8-p97YzYGt8gBfnxh3Jn2HdvbqiqFuWB3SiDiin31nu_y0a17XY-fK9Y4-T-VfuwybpVcaBepfj4Fl1mJeFabinc7lkEAjfQyVehN-RCUlHhPhbcGuJGq-e5NgNOaDdu9t-tM5wTKfpZrNXQaRUqo2PnqJs5rxKocyn0d4k6NoC5XlUNoy4MMN1kNpZmY07WKQOoi-wqKAxX1rloYy4ImUl9_CgsjgtfjxY52"/>
</div>
<span class="flex-1 ml-4 font-body-md font-semibold text-on-surface">Orange Money</span>
<div class="radio-circle w-5 h-5 rounded-full border-2 border-outline-variant transition-all"></div>
</div>
<!-- Free Money -->
<div class="payment-option flex items-center h-[56px] px-4 cursor-pointer transition-all duration-200" onclick="selectPayment(this)">
<div class="w-10 h-10 rounded-lg overflow-hidden bg-white flex items-center justify-center">
<img alt="Free Money" class="w-8 h-8 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLvpkRr5Ga5RH48_LKBaB8oibbrd5HpaIT5k2FHBoPCq3ZpbS5ZbGkHr3LFp97Ad16fCbwlI2ffV0JoGNKJ8Rbn7ucQ4B5RpUtFDA5CWMD1uQCRj0n-y9S-2w1NQSV4WI7fij8kiQiISQr6l8w0WuJI9Wyzc6c5cbym6HcJPcOXG195YcHHZaFSmGIWAg8dAZMux8MS5ilfALtyaCxamGWfIu0Q9-z6QZQsQeO3Fp_DhJRidUODndNQITKQ"/>
</div>
<span class="flex-1 ml-4 font-body-md font-semibold text-on-surface">Free Money</span>
<div class="radio-circle w-5 h-5 rounded-full border-2 border-outline-variant transition-all"></div>
</div>
<!-- Card -->
<div class="payment-option flex items-center h-[56px] px-4 cursor-pointer transition-all duration-200" onclick="selectPayment(this)">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">credit_card</span>
</div>
<span class="flex-1 ml-4 font-body-md font-semibold text-on-surface">Carte bancaire</span>
<div class="radio-circle w-5 h-5 rounded-full border-2 border-outline-variant transition-all"></div>
</div>
</div>
</section>
<!-- Phone Number Input -->
<section class="mt-stack-md page-margin-left page-margin-right">
<label class="block font-label-md text-[14px] text-on-surface-variant mb-2">Numéro de téléphone associé</label>
<div class="relative">
<input class="w-full h-[52px] px-4 rounded-xl border-none bg-input-bg font-body-md text-on-surface placeholder-outline-variant" placeholder="Saisissez votre numéro" type="tel" value="+221 77 456 78 90"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-primary font-label-md">Modifier</button>
</div>
</section>
<!-- Secure Note -->
<section class="mt-stack-md flex justify-center items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="font-label-md text-[12px]">Paiement 100% sécurisé</span>
</section>
</main>
<!-- Fixed Bottom Button -->
<footer class="mt-auto page-margin-left page-margin-right pb-10">
<button class="w-full h-[52px] bg-primary-container text-on-primary-container font-headline-md rounded-xl hover:opacity-90 active:scale-[0.98] transition-all duration-200">
            Payer 45 500 FCFA
        </button>
</footer>
<script>
        function selectPayment(element) {
            // Remove active class from all options
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('active');
                const circle = opt.querySelector('.radio-circle');
                circle.style.backgroundColor = 'transparent';
                circle.style.borderColor = '#bbcabf';
                circle.style.boxShadow = 'none';
            });

            // Add active class to clicked element
            element.classList.add('active');
            const circle = element.querySelector('.radio-circle');
            circle.style.backgroundColor = '#006c49';
            circle.style.borderColor = '#006c49';
            circle.style.boxShadow = 'inset 0 0 0 3px white';
        }

        // Initialize first selection
        window.onload = () => {
            selectPayment(document.querySelector('.payment-option.active'));
        };
    </script>
</body></html>
