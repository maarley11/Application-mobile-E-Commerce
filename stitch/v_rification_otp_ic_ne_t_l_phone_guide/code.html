<script>
        // OTP Logic: Auto-focus next field
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Timer Logic
        let seconds = 45;
        const countdownElement = document.getElementById('timer-countdown');
        const timerText = document.getElementById('timer-text');
        const resendBtn = document.getElementById('resend-btn');

        const interval = setInterval(() => {
            seconds--;
            const formatted = seconds < 10 ? `00:0${seconds}` : `00:${seconds}`;
            countdownElement.textContent = formatted;

            if (seconds <= 0) {
                clearInterval(interval);
                timerText.classList.add('hidden');
                resendBtn.classList.remove('hidden');
            }
        }, 1000);

        resendBtn.addEventListener('click', () => {
            // Logic for resending code here
            alert('Code renvoyé !');
        });
    </script>
