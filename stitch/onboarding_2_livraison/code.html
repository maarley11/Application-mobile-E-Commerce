<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7faf8;
            color: #181c1c;
            overflow-x: hidden;
        }
        .speed-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #bbcabf);
            border-radius: 999px;
            position: absolute;
            animation: moveLine 1.5s infinite linear;
        }
        @keyframes moveLine {
            0% { transform: translateX(100px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(-200px); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="font-body-md text-on-surface bg-background min-h-screen flex flex-col">
<!-- Top Navigation -->
<nav class="flex justify-end pt-12 pr-margin-right pl-margin-left">
<button class="font-label-lg text-label-lg active:scale-95 transition-transform" style="color: oklch(0.55 0.02 160);">
            Passer
        </button>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col justify-center px-gutter relative overflow-hidden pt-12 items-start">
<!-- Speed Lines Background -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<div class="speed-line w-16 top-1/3 left-1/4" style="animation-delay: 0.2s;"></div>
<div class="speed-line w-12 top-1/2 left-10" style="animation-delay: 0.5s;"></div>
<div class="speed-line w-20 top-2/3 right-1/4" style="animation-delay: 0.8s;"></div>
<div class="speed-line w-14 top-1/4 right-10" style="animation-delay: 1.1s;"></div>
</div>
<!-- Illustration Container -->
<div class="relative w-full max-w-[320px] aspect-square flex items-center justify-center z-10 mb-10 ml-margin-left">
<!-- Decorative circle behind -->
<div class="absolute w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<img alt="Livraison rapide" class="w-full h-auto object-contain z-10" data-alt="A dynamic digital illustration of a delivery person riding a sleek emerald green scooter through the modern streets of Dakar. The rider wears a bright orange safety helmet and carries a prominent orange delivery box on the back. Thin horizontal motion lines surround the scooter to convey high speed and efficiency. The style is clean, modern, and minimalist with a palette of emerald green, vibrant orange, and soft neutral backgrounds, reflecting a premium e-commerce brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWjdPl7mS-Q5G6mcu_jCoZN9RzV4ooM0uU2x3Nfs7N10VPC0FcTFqhNN3ivaW1Z174PXA5qULeWD0jcAQkKnTB3vU-Y5XlEav-VMsIqJq4N4VlBJy5DnRAjeHW2WgU-ub4Xo2vZLSgspxPJnHe3WrH0I2d5anQx1DlSmXuruP7fgPQi4-lTNz_bZQrMH7y-0mwyLYFDjTPCU-VA1ebnenbxKj8VPf3CBwx0oOoW_Axw7Pf-3v5hH6q8B-wPa8u4ARL_GFK_ynny_ho">
</div>
<!-- Text Content -->
<div class="w-full px-margin-left z-10">
<h1 class="font-headline-xl text-headline-xl text-on-surface leading-tight mb-4">
                Livraison gratuite à Dakar
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px]">
                3 livraisons gratuites par semaine pour les membres Pro
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="pb-12 pt-stack-md px-margin-left pr-margin-right flex flex-col items-center">
<!-- Pagination Dots -->
<div class="flex gap-2 mb-stack-lg">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-secondary-container"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Action Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary-container font-label-lg text-label-lg rounded-xl flex items-center justify-center active:scale-[0.98] transition-all hover:opacity-90">
            Suivant
        </button>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('button');
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.98)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
