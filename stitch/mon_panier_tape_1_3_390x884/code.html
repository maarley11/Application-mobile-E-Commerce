<!-- Bottom Navigation Component (Suppressing for Transactional Page but providing structure as requested in hierarchy) -->
<!-- Note: Following the "Destination Rule", the BottomNavBar is hidden here to prioritize the checkout flow. -->
<script>
        // Micro-interaction for quantity selectors
        document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
            if (icon.textContent === 'add' || icon.textContent === 'remove') {
                icon.parentElement.addEventListener('click', function() {
                    const span = this.parentElement.querySelector('span:not(.material-symbols-outlined)');
                    let val = parseInt(span.textContent);
                    if (icon.textContent === 'add') val++;
                    else if (icon.textContent === 'remove' && val > 1) val--;
                    span.textContent = val;
                });
            }
        });
    </script>
