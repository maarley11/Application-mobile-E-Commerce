<style>
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 24px;
            bottom: -8px;
            width: 2px;
            background-color: #10b981; /* primary-container */
        }
        .timeline-line-dashed::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 24px;
            bottom: -8px;
            width: 2px;
            background-image: linear-gradient(to bottom, #bbcabf 50%, transparent 50%); /* outline-variant */
            background-size: 2px 8px;
            background-repeat: repeat-y;
        }
        .timeline-item:last-child .timeline-line::before,
        .timeline-item:last-child .timeline-line-dashed::before {
            display: none;
        }
        
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(249, 115, 22, 0);
            }
            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0);
            }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s infinite;
        }
    </style>

</div>
<div>

<p class="font-caption text-caption text-text-secondary mt-1">Aujourd'hui, 09:42</p>
</div>
</div>
<!-- Step 2: Preparing -->
<div class="timeline-item relative flex items-start gap-4">
<div class="timeline-line relative z-10 flex-shrink-0 w-6 h-6 rounded-full bg-primary-container flex items-center justify-center mt-1">

<div>

</div>
</div>
<!-- Step 3: Delivering (Current) -->

</div>
<div>

</div>
</div>
<!-- Step 4: Delivered -->
<div class="timeline-item relative flex items-start gap-4">
<div class="relative z-10 flex-shrink-0 w-6 h-6 rounded-full bg-surface-variant border-2 border-outline-variant flex items-center justify-center mt-1">
</div>
<div>
<p class="font-body-bold text-body-bold text-text-secondary">Livrée</p>

</div>
</div>
