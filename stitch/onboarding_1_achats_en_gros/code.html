<!-- Background Atmospheric Effect -->
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-secondary/5 rounded-full blur-[80px] pointer-events-none"></div>
<script>
        // Micro-interaction for the illustration on load
        window.addEventListener('DOMContentLoaded', () => {
            const img = document.querySelector('img');
            img.style.opacity = '0';
            img.style.transform = 'translateX(50px)';
            
            setTimeout(() => {
                img.style.transition = 'all 1.2s cubic-bezier(0.16, 1, 0.3, 1)';
                img.style.opacity = '1';
                img.style.transform = 'translateX(0)';
            }, 100);
        });

        // Simple button active state visual feedback
        const mainBtn = document.querySelector('button.bg-primary-container');
        mainBtn.addEventListener('click', function() {
            this.classList.add('opacity-90');
            setTimeout(() => this.classList.remove('opacity-90'), 200);
        });
    </script>
